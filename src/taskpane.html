<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenRedline</title>
    <link rel="icon" href="../assets/icon-32.png" />
    <link rel="stylesheet" href="./taskpane.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brandTitle">
          <img src="../assets/icon-64.png" alt="" />
          <div>
            <h1>OpenRedline</h1>
            <p id="status">选择 Word 文本后读取。</p>
          </div>
        </div>
        <div class="topActions">
          <button type="button" class="tinyButton" data-open-url="/src/taskpane.html">配置</button>
          <button type="button" class="tinyButton" data-open-url="https://github.com/fevly/openredline">GitHub</button>
          <button id="loadSelection" class="selectionButton" title="读取选中文本">选中文字</button>
        </div>
      </header>

      <section class="panel">
        <label for="selectedText">选中文本</label>
        <textarea id="selectedText" rows="7" placeholder="从 Word 读取选中的文字，也可以在这里手动粘贴。"></textarea>
      </section>

      <section class="panel">
        <div class="rowTitle">
          <label for="promptSelect">修订 Prompt</label>
          <div class="inlineActions configOnly">
            <button id="addPrompt" class="secondaryButton" title="新增 Prompt">新增</button>
            <button id="savePrompt" title="保存当前 Prompt">保存</button>
            <button id="deletePrompt" class="dangerButton" title="删除当前 Prompt">删除</button>
          </div>
        </div>
        <select id="promptSelect"></select>
        <input id="promptName" class="configOnly" type="text" placeholder="自定义 Prompt 名称" />
        <textarea id="promptText" class="configOnly" rows="6"></textarea>
      </section>

      <section class="panel">
        <div class="rowTitle">
          <span>参与比较的 AI</span>
          <div class="mainActions">
            <button id="normalizeSelection" class="secondaryButton" type="button">规范标点</button>
            <button id="stopCompare" class="dangerButton" type="button" hidden>停止</button>
            <button id="runCompare" type="button">生成比较</button>
          </div>
        </div>
        <div class="rowTitle compactTitle">
          <span>模型</span>
          <button id="addModel" class="secondaryButton configOnly">新增</button>
        </div>
        <div id="modelList" class="modelList"></div>
        <label class="toggleRow" for="normalizeChinese">
          <input id="normalizeChinese" type="checkbox" checked />
          <span>插入前使用中文标点规范化</span>
        </label>
      </section>

      <section class="results" id="results"></section>
    </main>

    <template id="resultTemplate">
      <article class="resultCard">
        <div class="resultHeader">
          <strong></strong>
          <div class="resultActions">
            <button class="secondaryButton editButton" type="button">编辑</button>
            <button class="secondaryButton previewButton" type="button">预览</button>
            <button class="insertButton" type="button">插入</button>
          </div>
        </div>
        <textarea class="markdownSource" rows="8"></textarea>
        <div class="markdownPreview" hidden></div>
      </article>
    </template>

    <script type="module" src="./app.js?v=20260429-stop-glass"></script>
  </body>
</html>
