name: Build OpenRedline Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  mac:
    name: macOS PKG
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: npm run pkg:build
      - uses: actions/upload-artifact@v4
        with:
          name: OpenRedline-mac-preview
          path: dist/OpenRedline-mac-preview.pkg

  windows:
    name: Windows EXE
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run validate
      - name: Prepare Windows installer staging
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $staging = "dist\OpenRedline-windows-staging"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          $exclude = @(".git", ".github", ".env", "data", "dist", ".DS_Store", "openredline-helper.log", "mac-helper", "installer")
          Get-ChildItem -Force | Where-Object { $exclude -notcontains $_.Name } | ForEach-Object {
            Copy-Item $_.FullName (Join-Path $staging $_.Name) -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path "$staging\runtime" | Out-Null
          Copy-Item (Get-Command node).Source "$staging\runtime\node.exe" -Force
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress
      - name: Build Windows EXE installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "windows\openredline.iss" "/DSourceDir=$PWD\dist\OpenRedline-windows-staging" "/DOutputDir=$PWD\dist"
      - uses: actions/upload-artifact@v4
        with:
          name: OpenRedline-windows-preview
          path: dist/OpenRedline-windows-preview.exe
